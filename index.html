<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🏆 SSENS SQUASH RANKING 🏆</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ---------------------------------------------------------
        // 🚩 Firebase 설정 (지훈님의 설정값)
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCS_vAj07bMoJTHRCi9_ChHzYrK3Mwjcgg",
            authDomain: "squash-ranking-a6470.firebaseapp.com",
            projectId: "squash-ranking-a6470",
            storageBucket: "squash-ranking-a6470.firebasestorage.app",
            messagingSenderId: "951715686742",
            appId: "1:951715686742:web:6d8dcd7aca0af5e67f0ef7",
            measurementId: "G-ZX87RQ5KYW",
            databaseURL: "https://squash-ranking-a6470-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ---------------------------------------------------------
        // 📋 1. 초기 선수 명단 (순서대로 입력해 주세요)
        // ---------------------------------------------------------
        const INITIAL_PLAYERS = [
            "김진솔", "이상화", "최예지", "최상현", "조준희",
            "한준수", "이진이", "강현민", "김규민", "오유송",
            "신진원", "허 완", "김청하", "박서희", "이지훈",
            "최은주", "방민선", "김승현", "하정유", "성스레"
        ];

        const INJURED = ["한준수", "하정유"];

        let players = [];
        let matchLogs = [];

        const playerList = document.getElementById('playerList');
        const comboChallenger = document.getElementById('comboChallenger');
        const comboTarget = document.getElementById('comboTarget');
        const logList = document.getElementById('logList');
        const editorNameInput = document.getElementById('editorName');

        let filterName = ""; // 현재 필터링 중인 선수 이름

        function initApp() {
            // 랭킹 감시
            onValue(ref(db, 'rankings'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    players = data;
                } else {
                    players = [...INITIAL_PLAYERS];
                    set(ref(db, 'rankings'), players);
                }
                renderRankings();
                updateCombos();
            });

            // 로그 감시
            onValue(ref(db, 'matchLogs'), (snapshot) => {
                const data = snapshot.val();
                matchLogs = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })).reverse() : [];
                renderLogs();
            });
        }

        function renderRankings() {
            playerList.innerHTML = '';
            players.forEach((name, index) => {
                const rank = index + 1;
                const li = document.createElement('div');
                li.className = `player-card rank-${rank}`;
                if (rank <= 3) li.classList.add('top-tier');
                if (filterName === name) li.classList.add('active');

                const injuredTag = INJURED.includes(name)
                    ? ' <span class="injured-tag">(대결 불가)</span>' : '';
                if (INJURED.includes(name)) li.classList.add('injured');
                li.innerHTML = `<div class="rank-badge">${rank}</div><div class="player-name">${name}${injuredTag}</div>`;

                li.onclick = () => {
                    toggleFilter(name);
                    if (index !== 0 && !INJURED.includes(name)) {
                        comboChallenger.value = index;
                        updateTargetCombo();
                    }
                };

                playerList.appendChild(li);
            });
        }

        function toggleFilter(name) {
            if (filterName === name) {
                filterName = "";
            } else {
                filterName = name;
            }
            renderRankings();
            renderLogs();
            updateFilterUI();
        }

        window.clearFilter = () => {
            filterName = "";
            renderRankings();
            renderLogs();
            updateFilterUI();
        };

        function updateFilterUI() {
            const filterInfo = document.getElementById('filterInfo');
            if (filterName) {
                filterInfo.innerHTML = `
                    <div class="filter-tag">
                        👤 ${filterName}의 기록 보기
                        <span class="clear-filter" onclick="clearFilter()">전체보기 ✕</span>
                    </div>
                `;
                filterInfo.style.display = 'block';
            } else {
                filterInfo.style.display = 'none';
            }
        }

        function renderLogs() {
            logList.innerHTML = '';

            const filteredLogs = filterName
                ? matchLogs.filter(log => log.challenger === filterName || log.target === filterName)
                : matchLogs;

            if (filteredLogs.length === 0) {
                logList.innerHTML = '<div style="text-align:center; padding: 2rem; color: #888;">기록이 없습니다.</div>';
                return;
            }

            filteredLogs.forEach(log => {
                const item = document.createElement('div');
                item.className = `log-item ${log.type === 'undo' ? 'undo' : (log.success ? 'win' : 'lose')}`;
                const date = new Date(log.timestamp).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                let logContent = `<strong>${log.challenger}</strong> → <strong>${log.target}</strong> 도전에 ${log.success ? '승리' : '패배'}!`;
                if (log.type === 'undo') logContent = `↩️ 경기 결과 되돌리기 실행`;

                item.innerHTML = `
                    <div class="log-info">
                        ${logContent}
                        <span class="log-meta">${date} | 수정자: ${log.editor || '익명'}</span>
                    </div>
                `;
                logList.appendChild(item);
            });
        }

        function updateCombos() {
            const currentChallenger = comboChallenger.value;
            const currentEditor = editorNameInput.value;

            comboChallenger.innerHTML = '<option value="">도전자 선택</option>';
            editorNameInput.innerHTML = '<option value="">수정자 선택 (본인 이름)</option>';

            players.forEach((name, i) => {
                // 수정자 목록 채우기
                const editorOpt = document.createElement('option');
                editorOpt.value = name;
                editorOpt.textContent = name;
                editorNameInput.appendChild(editorOpt);

                // 도전자 목록 채우기 (1위 제외, 부상자 제외)
                if (i !== 0 && !INJURED.includes(name)) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${i + 1}위 ${name}`;
                    comboChallenger.appendChild(opt);
                }
            });

            if (currentChallenger) comboChallenger.value = currentChallenger;
            if (currentEditor) editorNameInput.value = currentEditor;
            updateTargetCombo();
        }

        window.updateTargetCombo = () => {
            const chIdx = parseInt(comboChallenger.value);
            comboTarget.innerHTML = '<option value="">대상 선택</option>';
            if (isNaN(chIdx)) return;
            const isSpecial = document.getElementById('specialDayToggle').checked;
            const baseWindow = isSpecial ? 6 : 4;
            const base = players.slice(Math.max(0, chIdx - baseWindow), chIdx);
            const windowSize = base.some(n => INJURED.includes(n)) ? baseWindow + 1 : baseWindow;
            for (let i = chIdx - 1; i >= Math.max(0, chIdx - windowSize); i--) {
                if (INJURED.includes(players[i])) continue;
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `${i + 1}위 ${players[i]}`;
                comboTarget.appendChild(opt);
            }
        };

        // 결과 적용
        window.applyResult = async () => {
            const chIdx = parseInt(comboChallenger.value);
            const targetIdx = parseInt(comboTarget.value);
            const isWin = document.getElementById('matchResult').value === 'win';
            const editor = editorNameInput.value.trim();

            if (isNaN(chIdx) || isNaN(targetIdx) || !editor) {
                alert("모든 필드를 입력해 주세요 (수정자 이름 필수)");
                return;
            }

            // 되돌리기를 위해 현재 상태 저장
            await set(ref(db, 'previousRankings'), players);

            const challengerName = players[chIdx];
            const targetName = players[targetIdx];

            if (isWin) {
                const movedPlayer = players.splice(chIdx, 1)[0];
                players.splice(targetIdx, 0, movedPlayer);
                await set(ref(db, 'rankings'), players);
            }

            await push(ref(db, 'matchLogs'), {
                challenger: challengerName,
                target: targetName,
                success: isWin,
                editor: editor,
                timestamp: Date.now(),
                type: 'match'
            });

            comboChallenger.value = "";
            comboTarget.innerHTML = '<option value="">대상 선택</option>';

            const newRank = isWin ? targetIdx + 1 : chIdx + 1;
            const shareText = isWin
                ? `🏆 SSENS SQUASH 경기 결과\n\n${challengerName} → ${targetName} 도전 승리!\n${challengerName} 선수가 ${newRank}위로 올라섰습니다! 🎉`
                : `🏸 SSENS SQUASH 경기 결과\n\n${challengerName} → ${targetName} 도전 패배\n${challengerName} 선수의 순위가 유지됩니다.`;

            showShareModal(isWin, shareText);
        };

        function showShareModal(isWin, shareText) {
            const modal = document.getElementById('shareModal');
            const title = document.getElementById('shareModalTitle');
            const copyBtn = document.getElementById('shareCopyBtn');

            title.textContent = isWin ? "🎉 순위가 변경되었습니다!" : "결과가 반영되었습니다 (순위 유지)";
            modal.style.display = 'flex';

            copyBtn.onclick = async () => {
                await navigator.clipboard.writeText(shareText);
                copyBtn.textContent = '✅ 복사 완료!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 복사하기';
                    modal.style.display = 'none';
                }, 1200);
            };
        }

        window.closeShareModal = () => {
            document.getElementById('shareModal').style.display = 'none';
        };

        // 되돌리기 기능
        window.undoLastResult = async () => {
            const editor = editorNameInput.value.trim();
            if (!editor) {
                alert("되돌리기를 실행하는 분의 성함을 입력해 주세요.");
                editorNameInput.focus();
                return;
            }

            const snapshot = await get(ref(db, 'previousRankings'));
            const prevPlayers = snapshot.val();

            if (!prevPlayers) {
                alert("되돌릴 이전 기록이 없습니다.");
                return;
            }

            if (confirm("가장 최근의 경기 결과와 순위 변경을 취소하시겠습니까?")) {
                await set(ref(db, 'rankings'), prevPlayers);
                // 마지막 로그 삭제 (선택 사항)
                if (matchLogs.length > 0 && matchLogs[0].type === 'match') {
                    // Firebase에서 마지막 로그 ID를 찾아 삭제하고 싶다면 추가 로직 필요
                    // 여기서는 단순히 '되돌리기 로그'만 추가합니다.
                }

                await push(ref(db, 'matchLogs'), {
                    type: 'undo',
                    editor: editor,
                    timestamp: Date.now()
                });

                // 되돌리기 후에는 다시 되돌리지 못하게 이전 기록 삭제
                await remove(ref(db, 'previousRankings'));
                alert("이전 순위로 복구되었습니다.");
            }
        };

        initApp();
    </script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00ffcc;
            --secondary: #ff33cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: #0d0d12 url('bg.png') center/cover no-repeat fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px var(--accent);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ranking-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-card {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);

            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .player-card:hover {

            border-color: var(--accent);
        }

        .player-card.active {

            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .rank-badge {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;

            justify-content: center;
            font-weight: 700;
            margin-right: 1.5rem;
        }

        .top-tier.rank-1 .rank-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .top-tier.rank-2 .rank-badge {
            background: linear-gradient(135deg, #E0E0E0, #A0A0A0);
            color: #000;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.4);
        }

        .top-tier.rank-3 .rank-badge {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #000;
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.4);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        select,
        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 0.8rem;
            color: white;
            border-radius: 12px;
            font-size: 1rem;

        }

        button {

            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;

            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);

        .undo-btn {

            margin-top: 10px;

        }

        .undo-btn:hover {
            background: #ffaa00;
            color: #000;
        }

        .log-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-item {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            border-left: 4px solid #777;
        }

        .log-item.win {
            border-left-color: var(--accent);
        }

        .log-item.lose {
            border-left-color: var(--secondary);
            opacity: 0.8;
        }

        .log-item.undo {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
        }

        .log-meta {
            display: block;
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 5px;
        }

        /* 필터 UI 스타일 */
        .filter-info {
            margin-bottom: 1rem;
            display: none;
        }

        .filter-tag {
            display: inline-flex;

            gap: 10px;
            padding: 0.5rem 1rem;
            border-radius: 20px;

            color: var(--accent);

            font-size: 0.9rem;
        }

            transition: 0.3s;

            font-weight: 400;

            display: flex;
            align-items: center;
            gap: 10px;

            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.05);
            transition: 0.3s;
        }

        .special-day-toggle:has(input:checked) {
            border-color: rgba(255, 215, 0, 0.7);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
        }

        .special-day-toggle input {
            display: none;
        }

        .toggle-slider {
            width: 38px;
            height: 22px;
            background: rgba(255,255,255,0.2);
            border-radius: 11px;
            flex-shrink: 0;
            position: relative;
            transition: 0.3s;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        .special-day-toggle input:checked ~ .toggle-slider {

        .special-day-toggle input:checked ~ .toggle-slider::after {

        .toggle-label {

            font-weight: 600;
        }

            align-items: center;
            justify-content: center;

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;

        .modal-question {

            color: rgba(255, 255, 255, 0.85);

        }

        .modal-buttons {

            gap: 0.75rem;

        /* 버튼 행 (모든 화면) */

            display: flex;

            body {

                height: 100dvh;

            .container {
                grid-template-columns: 2fr 3fr;
                grid-template-rows: auto 1fr;
                height: 100dvh;
                padding: 0.5rem;
                gap: 0.5rem;
                align-items: stretch;
            }

            h1 {
                font-size: 0.95rem;
                margin-bottom: 0.25rem;
            }

            .glass-panel {
                padding: 0.65rem;
                border-radius: 14px;

            h2 {
                font-size: 0.8rem;

                display: flex;

                overflow: hidden;

            .ranking-area {
                flex: 1;

            /* 2/3 크기 선수 카드 */
            .player-card {
                padding: 0.28rem 0.5rem;
            }

            .player-card:hover {
                transform: none;
            }

            .rank-badge {
                width: 22px;
                height: 22px;
                font-size: 0.65rem;
                margin-right: 0.45rem;
                flex-shrink: 0;
            }

            .player-name {
                font-size: 0.78rem;
            }

            /* 오른쪽 컬럼: 경기기록(상) + 결과입력(하) */
            .right-column {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                overflow: hidden;
            }

            /* 경기 기록: 위로 배치, 남은 공간 채우기 */
            #panel-history {
                order: -1;
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .filter-info {
                flex-shrink: 0;
            }

            .log-list {
                flex: 1;
                max-height: none;
                overflow-y: auto;
                gap: 6px;
            }

            .log-item {
                padding: 0.45rem 0.6rem;
                font-size: 0.72rem;
            }

            /* 결과 입력: 아래 고정 */
            #panel-entry {
                flex-shrink: 0;
                margin-bottom: 0 !important;
            }

            .input-group {
                gap: 0.35rem;
            }

            select {
                padding: 0.45rem 0.5rem;
                font-size: 0.78rem;
            }

            button {
                padding: 0.55rem 0.4rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div id="shareModal" style="display:none;" class="modal-overlay" onclick="if(event.target===this)closeShareModal()">
        <div class="modal-box">
            <div id="shareModalTitle" class="modal-title"></div>
            <div class="modal-question">결과 공유를 위해 복사하시겠습니까?</div>
            <div class="modal-buttons">
                <button class="modal-close-btn" onclick="closeShareModal()">닫기</button>
                <button id="shareCopyBtn" class="modal-copy-btn">📋 복사하기</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🏆 SSENS SQUASH RANKING</h1>
        <div class="glass-panel" id="panel-ranking">
            <h2>📊 Current Rankings</h2>
            <div id="playerList" class="ranking-area"></div>
        </div>
        <div class="right-column">
            <div class="glass-panel" id="panel-entry" style="margin-bottom: 2rem;">
                <h2>🖋️ Match Result Entry</h2>
                <div class="input-group">
                    <select id="comboChallenger" onchange="updateTargetCombo()"></select>
                    <select id="comboTarget"></select>
                    <select id="matchResult">
                        <option value="win">승리 (자리 탈환)</option>
                        <option value="lose">패배 (순위 유지)</option>
                    </select>
                    <select id="editorName"></select>
                    <label class="special-day-toggle">
                        <input type="checkbox" id="specialDayToggle" onchange="updateTargetCombo()">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">⭐ 특별한 날 모드 (최대 6단계 위 도전)</span>
                    </label>
                    <div class="button-row">
                        <button class="undo-btn" onclick="undoLastResult()">↩️ 되돌리기</button>
                        <button onclick="applyResult()">결과 반영하기</button>
                    </div>
                </div>
            </div>
            <div class="glass-panel" id="panel-history">
                <h2>🕒 Match History</h2>
                <div id="filterInfo" class="filter-info"></div>
                <div id="logList" class="log-list"></div>
            </div>
        </div>
    </div>
</body>

</html>
